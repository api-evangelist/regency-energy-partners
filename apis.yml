description: >-
  Regency Energy Partners LP (NYSE: RGP) was a publicly traded master limited
  partnership focused on midstream natural gas services including gathering,
  processing, contract compression, treating, and transportation of natural gas,
  crude oil, and natural gas liquids. Regency operated in North Louisiana, West
  Texas, and the Mid-Continent region before being acquired by Energy Transfer
  Partners in a $11 billion transaction in 2015 and merged into Energy Transfer's
  broader midstream operations.
